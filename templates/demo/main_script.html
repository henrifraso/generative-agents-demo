{% load static %}

<script type="text/javascript">
	/*
	  Main resources: 
	  https://www.youtube.com/watch?v=cKIG1lKwLeo&t=401s&ab_channel=HongLy
	  For the ground zero code, see the exported files from here: 
	  https://codepen.io/mikewesthad/pen/BVeoYP?editors=1111 

	  Also worth taking a look: 
	  https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  and 
	  https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	 */


	// ###########################################################################
	// PREAMBLE
	// ###########################################################################

	// <step> -- one full loop around all three phases determined by <phase> is 
	// a step. We use this to link the steps in the backend. 
	let step = {{step}};
	let sim_code = "{{sim_code}}";
 	let step_size = {{sec_per_step}} * 1000; // 10 seconds = 10000

	// Calcula largura do canvas para preencher a tela sem borda preta
	var _GAME_H = 3200;
	var _GAME_W = Math.max(4480, Math.ceil(window.innerWidth * _GAME_H / window.innerHeight / 32) * 32);
	window._GAME_W = _GAME_W;
	window._GAME_H = _GAME_H;

	// Phaser 3.0 global settings.
	// Configuration meant to be passed to the main Phaser game instance.
	const config = {
	  type: Phaser.AUTO,
	  width: _GAME_W,
	  height: _GAME_H,
	  parent: "game-container",
	  pixelArt: true,
	  physics: {
	    default: "arcade",
	    arcade: {
	      gravity: { y: 0 } } },
	  scene: {
	    preload: preload,
	    create: create,
	    update: update },
	  scale: { zoom: 1 } };


	// Creating the game instance and setting up the main Phaser variables that  
	// will be used in it. 
	const game = new Phaser.Game(config);
	let cursors;
	var player;

	// Persona related variables. This should have the name of the persona as its 
	// keys, and the instances of the Persona class as the values.
	let persona_names = {{ persona_init_pos|safe }};
	var spawn_tile_loc = {};
	for (var key in persona_names){
		spawn_tile_loc[key] = persona_names[key] ;
	}

	var personas = {};
	var pronunciatios = {};
	var speech_bubbles = {};
	let anims_direction;
	let pre_anims_direction;
	let pre_anims_direction_dict = {};

	// <tile_width> is the width of one individual tile (tiles are square)
	let tile_width = 32;
	// Important: tile_width % movement_speed has to be 0. 
	// <movement_speed> determines how fast we move at each upate cylce. 
	let movement_speed = {{play_speed}}; 

	// Variables for storing movements that are sent from the backend server.
	let execute_count_max = tile_width/movement_speed;
	let execute_count = execute_count_max;
	let movement_target = {};
	let all_movement = {{ all_movement|safe }};

  let start_datetime = new Date(Date.parse("{{start_datetime}}"));
  window.start_datetime = start_datetime;
  var datetime_options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
 	document.getElementById("game-time-content").innerHTML = start_datetime.toLocaleTimeString("en-US", datetime_options);
 	

	// ###########################################################################
	// ENGINE
	// ###########################################################################

	// Joon: Phaser 3.0 is oriented around "scenes" -- recall how Pokemon plays: 
	//       there is the outdoor space, and then there is the indoor space; when
	//       you go inside, you transition to a new "scene" and the outdoor space
	//       basically disappears. 
	//       A scene in Phaser has four key methods that are called at different
	//       stages of rendering for different purposes. They are: 
	//       init() -> preload() -> create() -> update()
	//         init() is called only once at the very beginning. This is the 
	//           initialization function in case that is needed. 
	//         preload() is called once and preloads any of the assets
	//         create() is also called once after preloading... creates sprites 
	//           and actually displays stuff
	//         update() is called on each frame during the game play 

	function preload() {  
		// For managing cross origin errors. We need to set this, change AWS 
		// CORS settings, and django AWS settings. 
		this.load.crossOrigin = '';

	  // Loading the necessary images (e.g., the background image, character 
	  // sprites). 
	  // Joon: for load.image, the first parameter is simply the key value that
	  //       you are passing in. The second parameter should be pointed to the
	  //       png file that contains the tileset. 
	  //       Also IMPORTANT: when you create a tileset in Tiled, always be  
	  //       sure to check the "embedded" option. 
	  this.load.image("blocks_1", "{% static 'assets/the_ville/visuals/map_assets/blocks/blocks_1.png' %}");
	  this.load.image("walls", "{% static 'assets/the_ville/visuals/map_assets/v1/Room_Builder_32x32.png' %}");
	  this.load.image("interiors_pt1", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt1.png' %}");
	  this.load.image("interiors_pt2", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt2.png' %}");
	  this.load.image("interiors_pt3", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt3.png' %}");
	  this.load.image("interiors_pt4", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt4.png' %}");
	  this.load.image("interiors_pt5", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt5.png' %}");
	  this.load.image("CuteRPG_Field_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_B.png' %}");
	  this.load.image("CuteRPG_Field_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_C.png' %}");
	  this.load.image("CuteRPG_Harbor_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Harbor_C.png' %}");
	  this.load.image("CuteRPG_Village_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Village_B.png' %}");
	  this.load.image("CuteRPG_Forest_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_B.png' %}");
	  this.load.image("CuteRPG_Desert_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_C.png' %}");
	  this.load.image("CuteRPG_Mountains_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Mountains_B.png' %}");
	  this.load.image("CuteRPG_Desert_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_B.png' %}");
	  this.load.image("CuteRPG_Forest_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_C.png' %}");

	  // Joon: This is the export json file you get from Tiled. 
	  this.load.tilemapTiledJSON("map", "{% static 'assets/the_ville/visuals/the_ville_jan7.json' %}");

	  // An atlas is a way to pack multiple images together into one texture. I'm 
	  // using it to load all the player animations (walking left, walking right, 
	  // etc.) in one image. For more info see:
	  // https://labs.phaser.io/view.html?src=src/animation/texture%20atlas%20animation.js
	  // If you don't use an atlas, you can do the same thing with a spritesheet, 
	  // see: https://labs.phaser.io/view.html?src=src/animation/single%20sprite%20sheet.js
	  // Joon: Technically, I think this guy had the best tutorial for atlas: 
	  //       https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  this.load.atlas("atlas", "{% static 'assets/characters/Yuriko_Yamamoto.png' %}", 
	  												     "{% static 'assets/characters/atlas.json' %}");

	  {% for p in persona_names %}
		  {% with 'assets/characters/'|add:p.underscore|add:'.png' as image_static %}
			  this.load.atlas("{{p.underscore}}", "{% static image_static %}", 
		  										  		     "{% static 'assets/characters/atlas.json' %}");
			{% endwith %}
	  {% endfor %}

	  this.load.image('speech_bubble', "{% static 'assets/speech_bubble/v3.png' %}");
	  this.load.image('beach_tree',  "{% static 'assets/beach_tree.png' %}");
	  this.load.image('beach_grass', "{% static 'assets/beach_grass.png' %}");
	}

	function create() {  
	  const map = this.make.tilemap({ key: "map" });
	  // Joon: Logging map is really helpful for debugging here: 
	  //       console.log(map);

	  // The first parameter is the name you gave to the tileset in Tiled and then
	  // the key of the tileset image in Phaser's cache (i.e. the name you used in
	  // preload)
	  // Joon: for the first parameter here, really take a look at the 
	  //       console.log(map) output. You need to make sure that the name 
	  //       matches.
	  const collisions = map.addTilesetImage("blocks", "blocks_1");
	  const walls = map.addTilesetImage("Room_Builder_32x32", "walls");
	  const interiors_pt1 = map.addTilesetImage("interiors_pt1", "interiors_pt1");
	  const interiors_pt2 = map.addTilesetImage("interiors_pt2", "interiors_pt2");
	  const interiors_pt3 = map.addTilesetImage("interiors_pt3", "interiors_pt3");
	  const interiors_pt4 = map.addTilesetImage("interiors_pt4", "interiors_pt4");
	  const interiors_pt5 = map.addTilesetImage("interiors_pt5", "interiors_pt5");
	  const CuteRPG_Field_B = map.addTilesetImage("CuteRPG_Field_B", "CuteRPG_Field_B");
	  const CuteRPG_Field_C = map.addTilesetImage("CuteRPG_Field_C", "CuteRPG_Field_C");
	  const CuteRPG_Harbor_C = map.addTilesetImage("CuteRPG_Harbor_C", "CuteRPG_Harbor_C");
	  const CuteRPG_Village_B = map.addTilesetImage("CuteRPG_Village_B", "CuteRPG_Village_B");
	  const CuteRPG_Forest_B = map.addTilesetImage("CuteRPG_Forest_B", "CuteRPG_Forest_B");
	  const CuteRPG_Desert_C = map.addTilesetImage("CuteRPG_Desert_C", "CuteRPG_Desert_C");
	  const CuteRPG_Mountains_B = map.addTilesetImage("CuteRPG_Mountains_B", "CuteRPG_Mountains_B");
	  const CuteRPG_Desert_B = map.addTilesetImage("CuteRPG_Desert_B", "CuteRPG_Desert_B");
	  const CuteRPG_Forest_C = map.addTilesetImage("CuteRPG_Forest_C", "CuteRPG_Forest_C");

	  // The first parameter is the layer name (or index) taken from Tiled, the 
	  // second parameter is the tileset you set above, and the final two 
	  // parameters are the x, y coordinate. 
	  // Joon: The "layer name" that comes as the first parameter value  
	  //       literally is taken from our Tiled layer name. So to find out what
	  //       they are; you actually need to open up tiled and see how you 
	  //       named things there. 
	  let tileset_group_1 = [CuteRPG_Field_B, CuteRPG_Field_C, CuteRPG_Harbor_C, CuteRPG_Village_B, 
	  											 CuteRPG_Forest_B, CuteRPG_Desert_C, CuteRPG_Mountains_B, CuteRPG_Desert_B, CuteRPG_Forest_C,
	  											 interiors_pt1, interiors_pt2, interiors_pt3, interiors_pt4, interiors_pt5, walls];
	  const bottomGroundLayer = map.createLayer("Bottom Ground", tileset_group_1, 0, 0);
	  const exteriorGroundLayer = map.createLayer("Exterior Ground", tileset_group_1, 0, 0);
	  const exteriorDecorationL1Layer = map.createLayer("Exterior Decoration L1", tileset_group_1, 0, 0);
	  const exteriorDecorationL2Layer = map.createLayer("Exterior Decoration L2", tileset_group_1, 0, 0);
	  const interiorGroundLayer = map.createLayer("Interior Ground", tileset_group_1, 0, 0);
	  const wallLayer = map.createLayer("Wall", [CuteRPG_Field_C, walls], 0, 0);
	  const interiorFurnitureL1Layer = map.createLayer("Interior Furniture L1", tileset_group_1, 0, 0);
	  const interiorFurnitureL2Layer = map.createLayer("Interior Furniture L2 ", tileset_group_1, 0, 0);
	  const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
	  const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);

	  const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
	  // const groundLayer = map.createLayer("Ground", walls, 0, 0);
	  // const indoorGroundLayer = map.createLayer("Indoor Ground", walls, 0, 0);
	  // const wallsLayer = map.createLayer("Walls", walls, 0, 0);
	  // const interiorsLayer = map.createLayer("Furnitures", interiors, 0, 0);
	  // const builtInLayer = map.createLayer("Built-ins", interiors, 0, 0);
	  // const appliancesLayer = map.createLayer("Appliances", interiors, 0, 0);
	  // const foregroundLayer = map.createLayer("Foreground", interiors, 0, 0);

	  // Joon : This is where you want to create a custom field for the tileset
	  //        in Tiled. Take a look at this guy's tutorial: 
	  //        https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	  collisionsLayer.setCollisionByProperty({ collide: true });
	  // By default, everything gets depth sorted on the screen in the order we 
	  // created things. Here, we want the "Above Player" layer to sit on top of 
	  // the player, so we explicitly give it a depth. Higher depths will sit on 
	  // top of lower depth objects.
	  // Collisions layer should get a negative depth since we do not want to see
	  // it. 
	  collisionsLayer.setDepth(-1);
	  foregroundL1Layer.setDepth(2);
	  foregroundL2Layer.setDepth(2);


	  // *** NIGHT OVERLAY — só tiles externos (sem RenderTexture) ***
	  var _nightG = this.add.graphics().setDepth(3).setAlpha(0);
	  _nightG.fillStyle(0x000d47, 1);
	  for (var _ty = 0; _ty < 100; _ty++) {
	    for (var _tx = 0; _tx < 140; _tx++) {
	      if (!interiorGroundLayer.getTileAt(_tx, _ty)) _nightG.fillRect(_tx*32, _ty*32, 32, 32);
	    }
	  }
	  window._nightRT = _nightG;

	  // *** SET UP CAMERA *** 
	  // "player" is to be set as the center of mass for our "camera." We 
	  // basically create a game character sprite as we would for our personas 
	  // but we move it to depth -1 and let it pass through the collision map;  
	  // that is, do not have the following line: 
	  // this.physics.add.collider(player, collisionsLayer);
	  // OLD NOTE: Create a sprite with physics enabled via the physics system. 
	  // The image  used for the sprite has a bit of whitespace, so I'm using 
	  // setSize & setOffset to control the size of the player's body.
	  player = this.add.sprite(70*32+16, 50*32+16, "atlas", "down");
	  player.setDepth(1.8);
	  player.displayWidth = 40;
	  player.scaleY = player.scaleX;
	  // sprite simples (sem physics) — posição controlada diretamente
	  window._playerLabel = this.add.text(70*32+16, 50*32-8, '\u2605 YOU', {
	    font: 'bold 8px monospace', fill: '#ffffff', stroke: '#000000', strokeThickness: 4
	  }).setDepth(1.9).setOrigin(0.5, 1);
	  window._playerDir = 'down';
	  window._playerTX = 70; window._playerTY = 50;
	  window._playerTargPX = 70*32+16; window._playerTargPY = 50*32+16;
	  window._playerMoving = false;
	  window._chatOpen = false;
	  window._following = {};
	  // Setting up the camera.
	  const camera = this.cameras.main;
	  camera.startFollow(player);
	  var _worldW = _GAME_W;
	  camera.setZoom(1);
	  camera.setBounds(0, 0, _worldW, map.heightInPixels);
	  camera.startFollow(player);
	  cursors = this.input.keyboard.createCursorKeys();
	  window._camera = camera;
	  window._phaserScene = this;
	  window._remoteSprites = {}; // { player_id: {sprite, label, tx, ty} }

	  // Zoom com scroll do mouse
	  this.input.on('wheel', function(pointer, gameObjects, deltaX, deltaY) {
	    var newZoom = camera.zoom - deltaY * 0.001;
	    camera.setZoom(Math.max(0.25, Math.min(4, newZoom)));
	    game.canvas.focus();
	  });
	  game.canvas.setAttribute('tabindex', '0');
	  game.canvas.focus();

	  // Prevenir scroll das setas (handlers de A/Espaço ficam no base.html)
	  window.addEventListener('keydown', function(e) {
	    if ([37,38,39,40].indexOf(e.keyCode) >= 0) e.preventDefault();
	  }, false);

	  // *** SET UP PERSONAS *** 
	  // We start by creating the game sprite objects. 
	  for (let i=0; i<Object.keys(spawn_tile_loc).length; i++) { 
	    let persona_name = Object.keys(spawn_tile_loc)[i];
	    let start_pos = [spawn_tile_loc[persona_name][0] * tile_width + tile_width / 2, 
	                     spawn_tile_loc[persona_name][1] * tile_width + tile_width];
	    let new_sprite = this.physics.add
	                         .sprite(start_pos[0], start_pos[1], persona_name, "down")
	                         .setSize(30, 40)
	                         .setOffset(0, 0);
	    // Scale up the sprite
      new_sprite.displayWidth = 40;
      new_sprite.scaleY = new_sprite.scaleX;

	    // Here, we are creating the persona and its pronunciatio sprites.
	    personas[persona_name] = new_sprite;
	    speech_bubbles[persona_name] = this.add.image(new_sprite.body.x - 0, 
	    																						  new_sprite.body.y - 30,
	    																						  'speech_bubble').setDepth(3);
      speech_bubbles[persona_name].displayWidth = 130;
      speech_bubbles[persona_name].displayHeight = 58;

	    pronunciatios[persona_name] = this.add.text(
	                                   new_sprite.body.x - 6,
	                                   new_sprite.body.y - 42,
	                                   "🦁", {
	                                   font: "24px monospace",
	                                   fill: "#000000",
	                                   padding: { x: 8, y: 8},
	                                   border:"solid",
	                                   borderRadius:"10px"}).setDepth(3);
	  }

	  // Modo Cliente: câmera segue o NPC nomeado, jogador oculto
	  if (window._clientMode && window._clientName) {
	    var _cname = window._clientName;
	    for (var _cpn in personas) {
	      if (_cpn.toLowerCase() === _cname.toLowerCase()) {
	        camera.startFollow(personas[_cpn]);
	        break;
	      }
	    }
	    player.setAlpha(0);
	    if (window._playerLabel) window._playerLabel.setAlpha(0);
	  }

	  // Indicadores de proximidade por NPC
	  window._indicators = {};
	  for (var _ipn in personas) {
	    window._indicators[_ipn] = this.add.text(0, 0, '!', {
	      fontFamily: "'Press Start 2P', monospace",
	      fontSize: '7px', color: '#ffe97a',
	      stroke: '#000000', strokeThickness: 3,
	      padding: { x: 3, y: 2 }
	    }).setDepth(5).setAlpha(0);
	  }

	  // Barras de capacidade por NPC
	  window._npcCapacity = {};
	  window._capGraphics = {};
	  for (var _bpn in personas) {
	    window._npcCapacity[_bpn] = 0.2 + Math.random() * 0.55;
	    window._capGraphics[_bpn] = this.add.graphics().setDepth(5);
	  }

	  // *** PRAIA — nos últimos 30 rows do mapa (Y=2240–3200), tiles mascarados ***
	  {
	    var _bsc = this;
	    var _bMW = 140 * 32; // 4480px
	    var _beachStartRow = 83; // edifícios terminam em row 82, praia começa em 83
	    var _BY = _beachStartRow * 32; // Y=2656
	    var _BEACH_H = map.heightInPixels - _BY; // 544px (17 linhas)
	    window._BEACH_H = _BEACH_H;
	    window._BEACH_Y  = _BY;

	    // Mascarar tiles das linhas 70-99 para a praia aparecer limpa
	    [bottomGroundLayer, exteriorGroundLayer, exteriorDecorationL1Layer,
	     exteriorDecorationL2Layer, wallLayer, interiorGroundLayer,
	     interiorFurnitureL1Layer, interiorFurnitureL2Layer,
	     foregroundL1Layer, foregroundL2Layer].forEach(function(layer) {
	      for (var _mty = _beachStartRow; _mty < 100; _mty++) {
	        for (var _mtx = 0; _mtx < 140; _mtx++) {
	          var _mt = layer.getTileAt(_mtx, _mty);
	          if (_mt) _mt.setAlpha(0);
	        }
	      }
	    });

	    // grama (32px) → gradiente (16px) → areia (64px) → molhada (32px) → ondas (96px) → oceano (restante)
	    var _grassH = 32, _gradH = 16, _sandH = 64, _wetH = 32, _waveH = 96;
	    var _oceanH = _BEACH_H - _grassH - _gradH - _sandH - _wetH - _waveH; // ~304px

	    // Grama + árvores (transição mapa→praia)
	    {
	      var _fbSrc = this.textures.get('CuteRPG_Field_B').getSourceImage();
	      if (!this.textures.exists('_beach_tree_sprite')) {
	        var _tc = document.createElement('canvas'); _tc.width = 64; _tc.height = 64;
	        var _tcx = _tc.getContext('2d');
	        _tcx.drawImage(_fbSrc, 32, 0, 32, 32,  0,  0, 32, 32);
	        _tcx.drawImage(_fbSrc, 32, 0, 32, 32, 32,  0, 32, 32);
	        _tcx.drawImage(_fbSrc, 32, 0, 32, 32,  0, 32, 32, 32);
	        _tcx.drawImage(_fbSrc, 32, 0, 32, 32, 32, 32, 32, 32);
	        _tcx.drawImage(_fbSrc, 160, 320, 64, 64, 0, 0, 64, 64);
	        this.textures.addCanvas('_beach_tree_sprite', _tc);
	      }
	      if (!this.textures.exists('_beach_grass_sprite')) {
	        var _gc = document.createElement('canvas'); _gc.width = 32; _gc.height = 32;
	        _gc.getContext('2d').drawImage(_fbSrc, 32, 0, 32, 32, 0, 0, 32, 32);
	        this.textures.addCanvas('_beach_grass_sprite', _gc);
	      }
	      _bsc.add.tileSprite(0, _BY, _GAME_W, _grassH, '_beach_grass_sprite')
	        .setDepth(1.1).setOrigin(0, 0);
	      for (var _ti = 0; 96 + _ti * 448 < _bMW; _ti++)
	        _bsc.add.image(96 + _ti * 448, _BY, '_beach_tree_sprite').setDepth(1.6).setOrigin(0, 0);
	    }

	    // Gradiente grama→areia
	    var _edgeCols = [0x4a5438,0x7a7048,0xb8a06a,0xd4b882];
	    _edgeCols.forEach(function(col, i) {
	      _bsc.add.graphics().setDepth(1.1).fillStyle(col,1)
	        .fillRect(0, _BY + _grassH + i * 4, _bMW, 4);
	    });

	    var _sandY = _BY + _grassH + _gradH;
	    var _wetY  = _sandY + _sandH;
	    var _waveY = _wetY  + _wetH;
	    var _oceanY = _waveY + _waveH;

	    // Areia seca
	    var _gSand = _bsc.add.graphics().setDepth(1);
	    _gSand.fillStyle(0xd4b882, 1).fillRect(0, _sandY, _bMW, _sandH);
	    _gSand.fillStyle(0xdcc490, 1);
	    for (var _si = 0; _si < 140; _si += 2) _gSand.fillRect(_si*32, _sandY, 32, _sandH);

	    // Areia molhada
	    var _gWet = _bsc.add.graphics().setDepth(1);
	    _gWet.fillStyle(0xb8a07a,1).fillRect(0, _wetY, _bMW, _wetH);
	    _gWet.fillStyle(0x7ab4d0, 0.25).fillRect(0, _wetY+4, _bMW, 12);

	function update(time, delta) {
		// *** SETUP PLAY AND PAUSE BUTTON *** 
		let play_context = this;
		function game_resume() {  
			play_context.scene.resume();
		}  
		play_button.onclick = function(){
			game_resume();
		};
		function game_pause() {  
			play_context.scene.pause();
		}  
		pause_button.onclick = function(){
			game_pause();
		};

	  // *** PLAYER MOVEMENT — tile-a-tile com _walkable (sprite simples) ***
	  if (!window._chatOpen && !window._clientMode && window._walkable) {
	    if (!window._playerMoving) {
	      var _pdx=0,_pdy=0,_pdir=window._playerDir;
	      if      (cursors.left.isDown)  { _pdx=-1; _pdir='left'; }
	      else if (cursors.right.isDown) { _pdx= 1; _pdir='right'; }
	      else if (cursors.up.isDown)    { _pdy=-1; _pdir='up'; }
	      else if (cursors.down.isDown)  { _pdy= 1; _pdir='down'; }
	      window._playerDir = _pdir;
	      if (_pdx!==0||_pdy!==0) {
	        var _ntx=window._playerTX+_pdx, _nty=window._playerTY+_pdy;
	        var _beachStartR = Math.floor((window._BEACH_Y || 2240) / 32);
	        var _inBeach = _nty >= _beachStartR && _nty < 100 && _ntx >= 0 && _ntx < 140;
	        var _inMap   = _ntx>=0&&_ntx<140&&_nty>=0&&_nty<100&&window._walkable[_nty][_ntx];
        if (_inBeach || _inMap) {
	          window._playerTX=_ntx; window._playerTY=_nty;
	          window._playerTargPX=_ntx*32+16; window._playerTargPY=_nty*32+16;
	          window._playerMoving=true;
	          player.anims.play('player-'+_pdir+'-walk',true);
	        } else { player.anims.stop(); player.setFrame(_pdir); }
	      } else { player.anims.stop(); player.setFrame(window._playerDir); }
	    }
	    if (window._playerMoving) {
	      var _mspd=movement_speed;
	      var _dx=window._playerTargPX-player.x, _dy=window._playerTargPY-player.y;
	      if (Math.abs(_dx)<=_mspd&&Math.abs(_dy)<=_mspd) {
	        player.setPosition(window._playerTargPX,window._playerTargPY);
	        window._playerMoving=false;
	      } else if (Math.abs(_dx)>=Math.abs(_dy)) {
	        player.x += (_dx>0?_mspd:-_mspd);
	      } else {
	        player.y += (_dy>0?_mspd:-_mspd);
	      }
	    }
	  }
	  if (window._playerLabel) {
	    window._playerLabel.x = player.x;
	    window._playerLabel.y = player.y - 24;
	  }

	  // ── Remote players (multiplayer) ──
	  if (window._mpMode && window._mpRemotePlayers && window._phaserScene) {
	    var _sc = window._phaserScene;
	    var _rp = window._mpRemotePlayers;
	    // Criar sprites para novos jogadores
	    for (var _rp_id in _rp) {
	      if (!window._remoteSprites[_rp_id]) {
	        var _rs = _sc.add.sprite(_rp[_rp_id].x, _rp[_rp_id].y, 'atlas', 'down').setDepth(1.85);
	        _rs.displayWidth = 40; _rs.scaleY = _rs.scaleX;
	        var _ci = _rp[_rp_id].ci || 1;
	        _rs.setTint(window._mpColors ? window._mpColors[_ci % window._mpColors.length] : 0xff6666);
	        var _rl = _sc.add.text(_rp[_rp_id].x, _rp[_rp_id].y - 30, _rp[_rp_id].name || '?', {
	          font: 'bold 8px monospace', fill: '#ffffff', stroke: '#000000', strokeThickness: 3
	        }).setDepth(1.95).setOrigin(0.5, 1);
	        window._remoteSprites[_rp_id] = {sprite: _rs, label: _rl, tx: _rp[_rp_id].x, ty: _rp[_rp_id].y};
	      }
	    }
	    // Atualizar posição e remover sprites de jogadores que saíram
	    for (var _rs_id in window._remoteSprites) {
	      if (!_rp[_rs_id]) {
	        window._remoteSprites[_rs_id].sprite.destroy();
	        window._remoteSprites[_rs_id].label.destroy();
	        delete window._remoteSprites[_rs_id];
	        continue;
	      }
	      var _rsd = window._remoteSprites[_rs_id];
	      _rsd.tx = _rp[_rs_id].x; _rsd.ty = _rp[_rs_id].y;
	      var _rdx = _rsd.tx - _rsd.sprite.x, _rdy = _rsd.ty - _rsd.sprite.y;
	      // Interpolação suave (lerp 0.18)
	      if (Math.abs(_rdx) > 1 || Math.abs(_rdy) > 1) {
	        _rsd.sprite.x += _rdx * 0.18;
	        _rsd.sprite.y += _rdy * 0.18;
	        var _rdir = _rp[_rs_id].dir || 'down';
	        _rsd.sprite.anims.play('player-' + _rdir + '-walk', true);
	      } else {
	        _rsd.sprite.setPosition(_rsd.tx, _rsd.ty);
	        _rsd.sprite.anims.stop();
	        _rsd.sprite.setFrame(_rp[_rs_id].dir || 'down');
	      }
	      _rsd.label.x = _rsd.sprite.x;
	      _rsd.label.y = _rsd.sprite.y - 28;
	    }
	  }

	  // Indicadores de proximidade (! acima dos NPCs a ≤ 2 tiles)
	  if (window._indicators && player) {
	    for (var _ipnU in window._indicators) {
	      var _ppU = personas[_ipnU];
	      var _indU = window._indicators[_ipnU];
	      if (!_ppU) { _indU.setAlpha(0); continue; }
	      var _distU = Math.hypot(player.x - _ppU.x, player.y - _ppU.y);
	      if (_distU <= 64 && !window._chatOpen) {
	        _indU.setAlpha(1);
	        _indU.x = _ppU.body.x + 14;
	        _indU.y = _ppU.body.y - 92;
	      } else {
	        _indU.setAlpha(0);
	      }
	    }
	  }

	  // ── Pipeline cozinha: warehouse → cozinhar (300f) → fridge ──
	  if (window._kitchen && window._kitchen.cooking) {
	    window._kitchen.timer++;
	    if (window._kitchen.timer >= 300) {
	      window._fridge = (window._fridge || 0) + window._kitchen.count;
	      window._kitchen = { cooking: false, timer: 0, count: 0 };
	      if (window._earnTokens) window._earnTokens(0); // refresh HUD
	    }
	  }

	  // ── Label do celeiro (visível a ≤ 96px) ──
	  if (window._barnLabel && player) {
	    var _bd = Math.hypot(player.x - (59*32+32), player.y - (50*32+28));
	    if (_bd <= 96) {
	      var _kt = window._kitchen;
	      var _wh = window._warehouse || 0;
	      var _fri = window._fridge || 0;
	      var _cookPct = _kt.cooking ? Math.floor(_kt.timer/3)+'%' : '-';
	      window._barnLabel.setText('WH:'+_wh+' COOK:'+_cookPct+' FRIG:'+_fri).setAlpha(1);
	      var _atext = _kt.cooking ? '' : _wh>0 ? 'F: COZINHAR' : _fri>0 ? 'F: SERVIR NPC' : '';
	      window._barnActionLabel.setText(_atext).setAlpha(_atext?1:0);
	    } else {
	      window._barnLabel.setAlpha(0);
	      window._barnActionLabel.setAlpha(0);
	    }
	  }

	  // Ciclo de fazenda + labels de interação
	  if (window._farmPlots && player) {
	    for (var _fui = 0; _fui < window._farmPlots.length; _fui++) {
	      var _fpu = window._farmPlots[_fui];
	      // Avançar estados por timer
	      if (_fpu.state === 'planted') {
	        _fpu.timer++;
	        if (_fpu.timer >= 600) { _fpu.state='growing'; _fpu.timer=0; _fpu.sprite.setTexture('farm_growing'); }
	      } else if (_fpu.state === 'growing') {
	        _fpu.timer++;
	        if (_fpu.timer >= 900) { _fpu.state='ready'; _fpu.timer=0; _fpu.sprite.setTexture('farm_ready'); }
	      }
	      // Label de proximidade
	      var _fpx=_fpu.tx*32+16, _fpy=_fpu.ty*32+16;
	      var _fpd=Math.hypot(player.x-_fpx, player.y-_fpy);
	      if (_fpd <= 64) {
	        var _ltxt = _fpu.state==='empty' ? 'F: PLANTAR' : _fpu.state==='ready' ? 'F: COLHER' : '';
	        _fpu.label.setText(_ltxt);
	        _fpu.label.setAlpha(_ltxt ? 1 : 0);
	      } else {
	        _fpu.label.setAlpha(0);
	      }
	    }
	  }

	  // Animação da praia
	  if (window._beachOcean) {
	    window._beachOcean.tilePositionX += 0.18;
	    window._beachOcean.tilePositionY += 0.06;
	  }
	  if (window._beachWave) {
	    window._beachWave.tilePositionX -= 0.35;
	  }
	  if (window._beachBirds) {
	    window._beachBirds.forEach(function(bd) {
	      bd.t += 0.03;
	      bd.x += bd.vx;
	      bd.y += Math.sin(bd.t) * 0.3;
	      if (bd.x > 140*32 + 40) bd.x = -40;
	      bd.g.clear();
	      bd.g.fillStyle(0xffffff, 0.85);
	      // silhueta de gaivota (dois arcos)
	      var bx = bd.x, by = bd.y, flap = Math.sin(bd.t*2)*2;
	      bd.g.fillTriangle(bx-8, by+flap, bx, by-2, bx+1, by+1);
	      bd.g.fillTriangle(bx+8, by+flap, bx, by-2, bx-1, by+1);
	    });
	  }

	  // Barras de capacidade + boost dos agentes
	  if (window._capGraphics) {
	    for (var _bpnU in window._capGraphics) {
	      var _bnpc = personas[_bpnU];
	      var _bg = window._capGraphics[_bpnU];
	      if (!_bnpc || !_bg) continue;
	      var _cap = window._npcCapacity[_bpnU] || 0.5;
	      var _boosted = window._npcBoost && window._npcBoost[_bpnU] > 0;
	      if (_boosted) {
	        // Boost: capacidade cai gradualmente (menos estressado)
	        _cap = Math.max(0.05, _cap - 0.004);
	      } else if (window._following && window._following[_bpnU]) {
	        _cap = Math.min(0.99, _cap + 0.006);
	      } else {
	        _cap += (Math.random() - 0.5) * 0.003;
	        _cap = Math.max(0.05, Math.min(0.95, _cap));
	      }
	      window._npcCapacity[_bpnU] = _cap;
	      var _bx = _bnpc.body.x + 1;
	      var _by = _bnpc.body.y - 100;
	      var _bw = 30, _bh = 4;
	      var _fw = Math.max(1, Math.round(_cap * _bw));
	      var _col = _boosted ? 0x00ffaa : _cap < 0.4 ? 0x44ff88 : _cap < 0.7 ? 0xffcc00 : 0xff3333;
	      _bg.clear();
	      _bg.fillStyle(0x000000, 0.65); _bg.fillRect(_bx, _by, _bw, _bh);
	      _bg.fillStyle(_col, 0.92);     _bg.fillRect(_bx, _by, _fw, _bh);
	    }
	  }

	  // Override de pronunciatio durante boost (após tudo mais)
	  if (window._npcBoost && pronunciatios) {
	    for (var _bnn in window._npcBoost) {
	      var _bt = window._npcBoost[_bnn];
	      if (_bt > 0 && pronunciatios[_bnn]) {
	        pronunciatios[_bnn].setText(_bt > 480 ? '🍽️' : '💪');
	        window._npcBoost[_bnn]--;
	        if (window._npcBoost[_bnn] <= 0) delete window._npcBoost[_bnn];
	      }
	    }
	  }

	  // Clones: destino → caminhar → esperar (3-10s) → novo destino
	  if (window._clones && window._walkable && window._occupied) {
	    var _cspd = 3; // levemente mais lento que movement_speed (4)
	    var _occ = window._occupied;
	    var _vt = window._validTiles;
	    for (var _ci = 0; _ci < window._clones.length; _ci++) {
	      var _cl = window._clones[_ci];
	      if (_cl.moving) {
	        var _cdx = _cl.tx - _cl.s.x, _cdy = _cl.ty - _cl.s.y;
	        if (Math.abs(_cdx) <= _cspd && Math.abs(_cdy) <= _cspd) {
	          _cl.s.x = _cl.tx; _cl.s.y = _cl.ty;
	          _cl.moving = false; _cl.stuck = 0;
	          if (_cl.tileX === _cl.dtx && _cl.tileY === _cl.dty) {
	            _cl.s.anims.stop();
	            _cl.wait = 180 + Math.floor(Math.random() * 420);
	            if (Math.random() < 0.4 && !_cl.bubbleTimer) {
	              var _e = window._cloneEmojis[Math.floor(Math.random()*window._cloneEmojis.length)];
	              _cl.btext.setText(_e); _cl.bubble.setAlpha(1); _cl.btext.setAlpha(1);
	              _cl.bubbleTimer = 150 + Math.floor(Math.random() * 150);
	            }
	          } else if (Math.random() < 0.15) {
	            _cl.s.anims.stop();
	            _cl.wait = 60 + Math.floor(Math.random() * 120);
	            if (Math.random() < 0.25 && !_cl.bubbleTimer) {
	              var _e = window._cloneEmojis[Math.floor(Math.random()*window._cloneEmojis.length)];
	              _cl.btext.setText(_e); _cl.bubble.setAlpha(1); _cl.btext.setAlpha(1);
	              _cl.bubbleTimer = 90 + Math.floor(Math.random() * 90);
	            }
	          }
	        } else if (Math.abs(_cdx) > Math.abs(_cdy)) {
	          _cl.s.x += _cdx > 0 ? _cspd : -_cspd;
	        } else {
	          _cl.s.y += _cdy > 0 ? _cspd : -_cspd;
	        }
	      } else if (_cl.wait > 0) {
	        _cl.wait--;
	      } else {
	        if (_cl.tileX === _cl.dtx && _cl.tileY === _cl.dty || _cl.stuck >= 5) {
	          var _nd = _vt[Math.floor(Math.random() * _vt.length)];
	          _cl.dtx = _nd.tx; _cl.dty = _nd.ty; _cl.stuck = 0;
	        }
	        var _ddx = _cl.dtx - _cl.tileX, _ddy = _cl.dty - _cl.tileY;
	        var _sx = _ddx > 0 ? 1 : _ddx < 0 ? -1 : 0;
	        var _sy = _ddy > 0 ? 1 : _ddy < 0 ? -1 : 0;
	        var _opts = Math.abs(_ddx) >= Math.abs(_ddy)
	          ? [{dx:_sx,dy:0},{dx:0,dy:_sy},{dx:0,dy:-_sy},{dx:-_sx,dy:0}]
	          : [{dx:0,dy:_sy},{dx:_sx,dy:0},{dx:-_sx,dy:0},{dx:0,dy:-_sy}];
	        var _moved = false;
	        for (var _di = 0; _di < _opts.length; _di++) {
	          var _d = _opts[_di];
	          if (_d.dx === 0 && _d.dy === 0) continue;
	          var _ntx = _cl.tileX + _d.dx, _nty = _cl.tileY + _d.dy;
	          // Anti-oscilação: não voltar ao tile anterior
	          if (_ntx === _cl.prevX && _nty === _cl.prevY) continue;
	          // Colisão entre clones: tile já ocupado
	          if (_occ[_nty * 140 + _ntx]) continue;
	          if (_ntx>=1&&_ntx<=138&&_nty>=1&&_nty<=98&&window._walkable[_nty][_ntx]) {
	            var _an = _d.dx>0?'right':_d.dx<0?'left':_d.dy>0?'down':'up';
	            // Atualizar occupied
	            delete _occ[_cl.tileY * 140 + _cl.tileX];
	            _occ[_nty * 140 + _ntx] = true;
	            // Atualizar prev
	            _cl.prevX = _cl.tileX; _cl.prevY = _cl.tileY;
	            _cl.tileX=_ntx; _cl.tileY=_nty;
	            _cl.tx=_ntx*32+16; _cl.ty=_nty*32+16;
	            _cl.moving=true;
	            _cl.s.anims.play(_cl.key+'-'+_an+'-walk', true);
	            _moved=true; break;
	          }
	        }
	        if (!_moved) { _cl.stuck++; _cl.wait=20; }
	      }
	      // Atualizar balão de fala
	      if (_cl.bubbleTimer > 0) {
	        _cl.bubbleTimer--;
	        _cl.bubble.x = _cl.s.x + 50; _cl.bubble.y = _cl.s.y - 30;
	        _cl.btext.x = _cl.s.x + 12; _cl.btext.y = _cl.s.y - 50;
	        if (_cl.bubbleTimer === 0) { _cl.bubble.setAlpha(0); _cl.btext.setAlpha(0); }
	      }
	    }
	  }


	  let curr_focused_persona = document.getElementById("temp_focus").textContent;
	  if (curr_focused_persona != "") {
	  	player.setPosition(personas[curr_focused_persona].x, personas[curr_focused_persona].y);
	  	document.getElementById("temp_focus").innerHTML = "";
	  }



	  // *** MOVING PERSONAS ***
	 	for (let i=0; i<Object.keys(personas).length; i++) {
	 		let curr_persona_name = Object.keys(personas)[i];
    	let curr_persona = personas[curr_persona_name];
    	let curr_pronunciatio = pronunciatios[Object.keys(personas)[i]];
    	let curr_speech_bubble = speech_bubbles[Object.keys(personas)[i]];

    	// Fase 3: NPC em modo seguir — override do movimento normal
    	if (window._following && window._following[curr_persona_name]) {
    	  var _fStop = 48; // distância de parada (1.5 tiles)
    	  var _ftx = player.x - curr_persona.x;
    	  var _fty = player.y - curr_persona.y;
    	  var _fdist = Math.sqrt(_ftx*_ftx + _fty*_fty);
    	  if (_fdist > _fStop) {
    	    var _fstep = Math.min(movement_speed, _fdist - _fStop); // nunca ultrapassa
    	    if (Math.abs(_ftx) >= Math.abs(_fty)) {
    	      curr_persona.body.x += _ftx > 0 ? _fstep : -_fstep;
    	      curr_persona.anims.play(curr_persona_name + (_ftx > 0 ? '-right-walk' : '-left-walk'), true);
    	    } else {
    	      curr_persona.body.y += _fty > 0 ? _fstep : -_fstep;
    	      curr_persona.anims.play(curr_persona_name + (_fty > 0 ? '-down-walk' : '-up-walk'), true);
    	    }
    	  } else {
    	    curr_persona.anims.stop();
    	  }
    	  curr_pronunciatio.setText('👣');
    	  curr_pronunciatio.x = curr_persona.body.x + 18;
    	  curr_pronunciatio.y = curr_persona.body.y - 67;
    	  curr_speech_bubble.x = curr_persona.body.x + 80;
    	  curr_speech_bubble.y = curr_persona.body.y - 39;
    	  continue;
    	}

    	if (curr_persona_name.replace("_", " ") in all_movement[step]) {
    		if (execute_count == execute_count_max) { 
    			let curr_x = all_movement[step][curr_persona_name.replace("_", " ")]["movement"][0]
	        let curr_y = all_movement[step][curr_persona_name.replace("_", " ")]["movement"][1]
    			movement_target[curr_persona_name] = [curr_x * tile_width, 
	                                              curr_y * tile_width]; 
	        let pronunciatio_content = all_movement[step][curr_persona_name.replace("_", " ")]["pronunciatio"];
	        let description_content = all_movement[step][curr_persona_name.replace("_", " ")]["description"];
	        let chat_content_raw = all_movement[step][curr_persona_name.replace("_", " ")]["chat"];

	        let chat_content = "";
	        if (chat_content_raw != null ){
		        for (let j=0; j<chat_content_raw.length; j++) { 
		        	chat_content += chat_content_raw[j][0] + ": " + chat_content_raw[j][1] + "<br>"
		        }
		      } else {
		      	chat_content = "<em>None at the moment</em>"
		      }

	       	// This is what gives the pronunciatio balloon the name initials. We 
	        // use regex to extract the initials of the personas. 
	        // E.g., "Dolores Murphy" -> "DM"
	        let rgx = new RegExp(/(\p{L}{1})\p{L}+/, 'gu');
	        let initials = [...curr_persona_name.matchAll(rgx)] || [];
	        initials = (
	          (initials.shift()?.[1] || '') + (initials.pop()?.[1] || '')
	        ).toUpperCase();
	        pronunciatios[curr_persona_name].setText(initials + ": " + pronunciatio_content);

	        // Updating the status of each personas 
	        document.getElementById("quick_emoji-"+curr_persona_name).innerHTML = pronunciatio_content;
	        document.getElementById("current_action__"+curr_persona_name).innerHTML = description_content.split("@")[0];
	        document.getElementById("target_address__"+curr_persona_name).innerHTML = description_content.split("@")[1];
	        document.getElementById("chat__"+curr_persona_name).innerHTML = chat_content;
    		}

    		if (execute_count > 0) {
    			if (curr_persona.body.x < movement_target[curr_persona_name][0]) {
	          curr_persona.body.x += movement_speed; 
	          anims_direction = "r";
	          pre_anims_direction = "r"
	          pre_anims_direction_dict[curr_persona_name] = "r"
	        } else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {
	          curr_persona.body.x -= movement_speed; 
	          anims_direction = "l";
	          pre_anims_direction = "l"
	          pre_anims_direction_dict[curr_persona_name] = "l"
	        } else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
	          curr_persona.body.y += movement_speed;
	          anims_direction = "d";
	          pre_anims_direction = "d"
	          pre_anims_direction_dict[curr_persona_name] = "d"
	        } else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
	          curr_persona.body.y -= movement_speed;
	          anims_direction = "u";
	          pre_anims_direction = "u"
	          pre_anims_direction_dict[curr_persona_name] = "u"
	        } else {
	        	anims_direction = "";
	        }

	        curr_pronunciatio.x = curr_persona.body.x + 18; 
          curr_pronunciatio.y = curr_persona.body.y - 42 - 25; // DEBUG 1 --- I added 32 offset on Dec 29. 
          curr_speech_bubble.x = curr_persona.body.x + 80; 
          curr_speech_bubble.y = curr_persona.body.y - 39;

          let left_walk_name = curr_persona_name + "-left-walk";
					let right_walk_name = curr_persona_name + "-right-walk";
					let down_walk_name = curr_persona_name + "-down-walk";
					let up_walk_name = curr_persona_name + "-up-walk";
          if (anims_direction == "l") {
			      curr_persona.anims.play(left_walk_name, true);
			    } else if (anims_direction == "r") {
			      curr_persona.anims.play(right_walk_name, true);
			    } else if (anims_direction == "u") {
			      curr_persona.anims.play(up_walk_name, true);
			    } else if (anims_direction == "d") {
			      curr_persona.anims.play(down_walk_name, true);
			    };
    		}
    	} else { 
    		curr_persona.anims.stop();
	      // If we were moving, pick an idle frame to use
	      if (pre_anims_direction_dict[curr_persona_name] == "l") curr_persona.setTexture(curr_persona_name, "left"); else
	      if (pre_anims_direction_dict[curr_persona_name] == "r") curr_persona.setTexture(curr_persona_name, "right"); else
	      if (pre_anims_direction_dict[curr_persona_name] == "u") curr_persona.setTexture(curr_persona_name, "up"); else
	      if (pre_anims_direction_dict[curr_persona_name] == "d") curr_persona.setTexture(curr_persona_name, "down");
    	}
	 	}

	  // *** ANIMAIS — movimento no update(), BFS max 4/frame ***
	  if (window._animals && window._bfs) {
	    var _aspd = 2, _bfsQ = 0;
	    for (var _ani = 0; _ani < window._animals.length; _ani++) {
	      var _an = window._animals[_ani];
	      if (_an.delay > 0) { _an.delay--; continue; }
	      if (_an.pi >= _an.path.length) {
	        if (_bfsQ >= 4) continue;
	        _an.wi = (_an.wi + 1) % _an.wps.length;
	        _an.path = window._bfs(_an.tx, _an.ty, _an.wps[_an.wi].tx, _an.wps[_an.wi].ty) || [];
	        _an.pi = 0; _bfsQ++;
	        // null inesperado: pular para próximo waypoint no próximo frame
	        if (_an.path.length === 0) { _an.pi = 1; continue; }
	      }
	      var _tgt = _an.path[_an.pi];
	      var _tdx = _tgt.tx*32+16 - _an.sp.x, _tdy = _tgt.ty*32+16 - _an.sp.y;
	      if (Math.abs(_tdx) <= _aspd && Math.abs(_tdy) <= _aspd) {
	        _an.sp.x = _tgt.tx*32+16; _an.sp.y = _tgt.ty*32+16;
	        _an.tx = _tgt.tx; _an.ty = _tgt.ty; _an.pi++;
	      } else if (Math.abs(_tdx) >= Math.abs(_tdy)) {
	        _an.sp.x += _tdx > 0 ? _aspd : -_aspd;
	      } else {
	        _an.sp.y += _tdy > 0 ? _aspd : -_aspd;
	      }
	    }
	  }

	  if (execute_count == 0) {
		  for (let i=0; i<Object.keys(personas).length; i++) {
	      let curr_persona_name = Object.keys(personas)[i]
	      let curr_persona = personas[curr_persona_name];
	      curr_persona.body.x = movement_target[curr_persona_name][0];
	      curr_persona.body.y = movement_target[curr_persona_name][1];
	    }
			execute_count = execute_count_max + 1;
	    step = step + 1;

	    start_datetime = new Date(start_datetime.getTime() + step_size);
    window.start_datetime = start_datetime;
 			document.getElementById("game-time-content").innerHTML = start_datetime.toLocaleTimeString("en-US", datetime_options);
    }

	  execute_count -= 1;
	}

	// Control button binders
	var play_button=document.getElementById("play_button");
	var pause_button=document.getElementById("pause_button");
</script>
