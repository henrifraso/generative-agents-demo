    /* Esconder tudo exceto o mapa */
    body > div > div:not(#game-container),
    body > div > br,
    body > div > h3,
    .row:not(#game-container .row),
    hr, .media, h2, h3, p,
    [style*="margin-top:10em"] { display: none !important; }

    /* Splash — duplo ID: especificidade (2,0,0) > regra hide (1,0,3) */
    #splash { display: flex !important; }
    #splash #spl-inner { display: block !important; }
    #splash #spl-title { display: block !important; }
    #splash #spl-sub   { display: block !important; }
    #splash #spl-btns  { display: flex !important; flex-direction:row; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; }
    /* Modal config */
    #cfg-modal.open { display: flex !important; }
    #cfg-modal #cfg-inner { display: block !important; }
    #cfg-modal #cfg-tit  { display: block !important; }
    #cfg-modal #cfg-lbl  { display: block !important; }
    #cfg-modal #cfg-opts { display: flex !important; flex-direction:column; align-items:center; gap:12px; }
    #cfg-modal #cfg-back { display: inline-block !important; }

    #pause-modal #pause-inner { display: block !important; }
    #pause-modal #pause-tit  { display: block !important; }
    #pause-modal #pause-opts { display: flex !important; flex-direction:column; align-items:center; gap:12px; }

    /* Tela cheia */
    html, body { margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%; }
    body > div { margin:0 !important; padding:0 !important; }
    #game-container {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      text-align:center; background:#000;
    }
    #game-container canvas {
      position:absolute;
      top:50%; left:50%;
      transform-origin:center center;
      image-rendering:pixelated;
    }
    /* Forçar cores fiéis no mobile */
    html {
      color-scheme: light only;
      -webkit-color-adjust: exact;
      color-adjust: exact;
      forced-color-adjust: none;
    }
    /* Boost de saturação só em touch (mobile/tablet) para igualar desktop */
    @media (hover: none) and (pointer: coarse) {
      #game-container canvas {
        -webkit-filter: saturate(1.3) contrast(1.08) brightness(0.86) !important;
        filter: saturate(1.3) contrast(1.08) brightness(0.86) !important;
      }
    }
  </style>

  <script>
    window._difficulty = 'easy';
    function setDiff(btn, d) {
      window._difficulty = d;
      document.querySelectorAll('.cfg-opt').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
    }
    // ENTER: send chat se aberto, senão abre/fecha pausa
    document.addEventListener('keydown', function(e) {
      if (window._chatOpen) {
        if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'chat-input') {
          e.preventDefault(); e.stopPropagation(); window._sendChat();
        }
        if (e.key === ' ' || e.key === 'Escape') { e.preventDefault(); window._closeChat(); }
        return;
      }
      // Tecla A — abrir chat com primeiro NPC disponível
      if (e.key === 'a' || e.key === 'A') {
        var pnames = (typeof personas !== 'undefined') ? Object.keys(personas) : [];
        if (pnames.length > 0) window._openChat(pnames[0]);
        return;
      }

      // Tecla S — NPC mais próximo começa a seguir o jogador
      if (e.key === 's' || e.key === 'S') {
        if (window._chatOpen) return;
        window._following = window._following || {};
        if (typeof personas !== 'undefined') {
          var closest2 = null, minD2 = Infinity;
          for (var pn2 in personas) {
            if (window._following[pn2]) continue; // já seguindo
            var pp2 = personas[pn2];
            var d2 = Math.hypot((player ? player.x : 0) - pp2.x, (player ? player.y : 0) - pp2.y);
            if (d2 < minD2) { minD2 = d2; closest2 = pn2; }
          }
          if (closest2) window._following[closest2] = true;
        }
        return;
      }

      // Tecla Espaço — cancela seguir todos os NPCs
      if (e.key === ' ') {
        window._following = {};
        return;
      }

      if (e.key !== 'Enter') return;
      var splash = document.getElementById('splash');
      if (splash && splash.style.display !== 'none') return;
      var pm = document.getElementById('pause-modal');
      if (pm.classList.contains('open')) pm.classList.remove('open');
      else pm.classList.add('open');
    });

    // ── Chat functions ──
    window._chatOpen = false;
    window._chatPersona = null;

    window._openChat = function(personaKey) {
      window._chatPersona = personaKey;
      window._chatOpen = true;
      var name = personaKey.replace(/_/g, ' ');
      document.getElementById('chat-npc-name').textContent = name;
      document.getElementById('chat-msgs').innerHTML = '';
      document.getElementById('chat-box').classList.add('open');
      // Saudação inicial do NPC
      setTimeout(function() {
        window._addChatLine(name, window._npcGreeting(personaKey), '#ffd700');
        setTimeout(function() { var inp = document.getElementById('chat-input'); if(inp) inp.focus(); }, 80);
      }, 150);
    };

    window._closeChat = function() {
      window._chatOpen = false;
      window._chatPersona = null;
      document.getElementById('chat-box').classList.remove('open');
      document.getElementById('chat-input').value = '';
      // Devolver foco ao canvas para setas voltarem a funcionar
      var cv = document.querySelector('#game-container canvas');
      if (cv) cv.focus();
    };

    window._addChatLine = function(sender, text, color) {
      var box = document.getElementById('chat-msgs');
      var d = document.createElement('div');
      d.className = 'chat-line';
      d.innerHTML = '<span style="color:'+color+';font-weight:bold;">'+sender+':</span> <span style="color:rgba(255,255,255,0.88);">'+text+'</span>';
      box.appendChild(d);
      box.scrollTop = box.scrollHeight;
    };

    window._sendChat = function() {
      var inp = document.getElementById('chat-input');
      var msg = (inp.value || '').trim();
      if (!msg || !window._chatPersona) return;
      inp.value = '';
      window._addChatLine('Você', msg, '#5bc8ff');
      var persona = window._chatPersona;
      setTimeout(function() {
        var resp = window._npcResponse(persona, msg);
        var name = persona.replace(/_/g, ' ');
        window._addChatLine(name, resp, '#ffd700');
      }, 500 + Math.random() * 400);
    };

    window._npcGreeting = function(personaKey) {
      var name = personaKey.replace(/_/g, ' ');
      try {
        var sd = (typeof all_movement!=='undefined' && typeof step!=='undefined') ? all_movement[step][name] : null;
        var emoji = sd ? sd.pronunciatio : '👋';
        var act = sd ? sd.description.split('@')[0].trim() : 'walking around';
        return emoji + ' Oh, olá! Eu estava ' + act + '. Em que posso ajudar?';
      } catch(e) { return '👋 Olá! É bom te ver por aqui!'; }
    };

    window._npcResponse = function(personaKey, playerMsg) {
      var name = personaKey.replace(/_/g, ' ');
      try {
        var sd = (typeof all_movement!=='undefined' && typeof step!=='undefined') ? all_movement[step][name] : null;
        var emoji = sd ? sd.pronunciatio : '💬';
        var act  = sd ? sd.description.split('@')[0].trim() : 'my routine';
        var loc  = sd && sd.description.includes('@') ? sd.description.split('@')[1].split(':').pop().trim() : 'town';
        var m = playerMsg.toLowerCase();
        if (m.match(/ol[aá]|^oi$|^hi$|hello/))          return emoji+' Olá! É sempre bom ver alguém novo por aqui!';
        if (m.match(/fazendo|doing|what.*you|o que/))     return emoji+' Estou '+act+' agora. É minha rotina hoje.';
        if (m.match(/onde|where|local|place|fica/))       return emoji+' Estou em '+loc+'. Venha me visitar quando quiser!';
        if (m.match(/nome|name|quem é|who are/))          return emoji+' Sou '+name+'! Moro aqui em Smallville há anos.';
        if (m.match(/tudo bem|como vai|how are|all good/))return emoji+' Tudo bem! Só '+act+' como de costume.';
        if (m.match(/tchau|bye|adeus|xau|até/))           return emoji+' Até logo! Cuide-se por aí!';
        if (m.match(/ajuda|help|preciso/))                return emoji+' Claro, posso tentar ajudar! O que você precisa?';
        var generic = [
          emoji+' Interessante! Estava pensando nisso também enquanto '+act+'.',
          emoji+' Hmm, boa pergunta. Aqui em '+loc+' a gente acaba refletindo sobre tudo.',
          emoji+' '+act+' me deixa com tempo pra pensar nessas coisas...',
          emoji+' Que ideia! Vou pensar nisso enquanto continuo meu dia.'
        ];
        return generic[Math.floor(Math.random()*generic.length)];
      } catch(e) { return '💬 Que interessante! Me conta mais.'; }
    };
  </script>

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>

	{% block js_content %}
	{% endblock js_content %}

  <script>
    var _s = 0, _sMin = 1;
    var _ox = 0, _oy = 0;
    var _CW = 4480, _CH = 3200;

    function _apply() {
      var c = document.querySelector('#game-container canvas');
      if (!c) return;
      var maxX = Math.max(0, (_CW * _s - window.innerWidth)  / 2);
      var maxY = Math.max(0, (_CH * _s - window.innerHeight) / 2);
      _ox = Math.max(-maxX, Math.min(maxX, _ox));
      _oy = Math.max(-maxY, Math.min(maxY, _oy));
      c.style.transform = 'translate(calc(-50% + ' + _ox + 'px), calc(-50% + ' + _oy + 'px)) scale(' + _s + ')';
    }

    function fitCanvas() {
      var c = document.querySelector('#game-container canvas');
      if (!c) { setTimeout(fitCanvas, 300); return; }
      _sMin = Math.max(window.innerWidth / c.offsetWidth, window.innerHeight / c.offsetHeight);
      if (_s < _sMin) _s = _sMin;
      _apply();
    }

    // Touch: 1 dedo = pan, 2 dedos = zoom
    var _pt = {}, _pd = null;
    document.addEventListener('touchstart', function(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        _pt[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(_pt);
      if (ids.length === 2)
        _pd = Math.hypot(_pt[ids[0]].x - _pt[ids[1]].x, _pt[ids[0]].y - _pt[ids[1]].y);
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
      var prev = {};
      for (var k in _pt) prev[k] = { x: _pt[k].x, y: _pt[k].y };
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (_pt[t.identifier]) _pt[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(_pt);
      if (ids.length >= 2) {
        var d = Math.hypot(_pt[ids[0]].x - _pt[ids[1]].x, _pt[ids[0]].y - _pt[ids[1]].y);
        if (_pd) _s = Math.max(_sMin, Math.min(_sMin * 5, _s * d / _pd));
        _pd = d;
      } else if (ids.length === 1) {
        var id = ids[0];
        _ox += _pt[id].x - prev[id].x;
        _oy += _pt[id].y - prev[id].y;
      }
      _apply();
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++)
        delete _pt[e.changedTouches[i].identifier];
      if (Object.keys(_pt).length < 2) _pd = null;
    }, { passive: false });

    window.addEventListener('resize', fitCanvas);
    setTimeout(fitCanvas, 500);
    setTimeout(fitCanvas, 1500);
    setTimeout(fitCanvas, 3000);

    // Atualiza alpha do overlay Phaser usando tempo da simulação (start_datetime)
    function updateDayNight() {
      if (!window._nightRT) return;
      var ref = (typeof start_datetime !== 'undefined') ? start_datetime : new Date();
      var h = ref.getHours() + ref.getMinutes() / 60;
      var alpha;
      if      (h >= 6  && h < 8)  alpha = (8-h)/2*0.15;
      else if (h >= 8  && h < 17) alpha = 0;
      else if (h >= 17 && h < 19) alpha = (h-17)/2*0.15;
      else if (h >= 19 && h < 21) alpha = 0.08 + (h-19)/2*0.1;
      else                        alpha = 0.52;
      window._nightRT.setAlpha(alpha);
    }
    window._forceNight = false;
    setInterval(function() {
      if (window._forceNight) { if (window._nightRT) window._nightRT.setAlpha(0.52); }
      else updateDayNight();
    }, 5000);
    history.replaceState(null, '', '/');

    // *** CHUVA — CSS puro, sem JS por frame ***
    // Níveis: 0=sem chuva, 1=fraca, 2=média, 3=forte
    window._rainLevel = 0;
    (function() {
      var st = document.createElement('style');
      st.textContent = [
        // Chuva inclinada pelo vento (diagonal acentuada)
        '@keyframes _rf{from{transform:translate(0,-20px) rotate(-28deg)}to{transform:translate(-22vw,110vh) rotate(-28deg)}}',
        // Folhas voando da direita para esquerda com ondulação
        '@keyframes _wl{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-28vw,6vh) rotate(60deg)}50%{transform:translate(-55vw,-4vh) rotate(120deg)}75%{transform:translate(-80vw,9vh) rotate(160deg)}100%{transform:translate(-115vw,3vh) rotate(200deg)}}'
      ].join('');
      document.head.appendChild(st);

      // *** VENTO — folhas voando ***
      var leafWrap = document.createElement('div');
      leafWrap.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;overflow:hidden;';
      document.documentElement.appendChild(leafWrap);
// *** PÁSSAROS ***
      var birdWrap = document.createElement('div');
      birdWrap.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:997;overflow:hidden;';
      document.documentElement.appendChild(birdWrap);
      var bSt = document.createElement('style');
      bSt.textContent = [
        '@keyframes _bdH{from{transform:translateX(0)}to{transform:translateX(120vw)}}',
        '@keyframes _bdU{from{transform:translateY(0)}to{transform:translateY(-120vh)}}',
        '@keyframes _bdD{from{transform:translateY(0)}to{transform:translateY(120vh)}}',
        '@keyframes _bfL{from{transform:rotate(-30deg)}to{transform:rotate(8deg)}}',
        '@keyframes _bfR{from{transform:rotate(30deg)}to{transform:rotate(-8deg)}}',
        '.brd{position:absolute;will-change:transform;}',
        '.brd::before,.brd::after{content:"";position:absolute;top:0;width:7px;height:5px;border-top:1.5px solid rgba(30,30,30,0.85);border-radius:50% 50% 0 0;}',
        '.brd::before{left:0;transform-origin:7px 1px;animation:_bfL 0.32s ease-in-out infinite alternate;}',
        '.brd::after{right:0;transform-origin:0 1px;animation:_bfR 0.32s ease-in-out infinite alternate;}'
      ].join('');
      document.head.appendChild(bSt);
      // 2 horizontal, 1 sobe, 1 desce — leve
      var _bconfigs = [
        {anim:'_bdH', left:'-5%',  top:(10+Math.random()*20).toFixed(0)+'%'},
        {anim:'_bdH', left:'-5%',  top:(35+Math.random()*20).toFixed(0)+'%'},
        {anim:'_bdU', left:(20+Math.random()*60).toFixed(0)+'%', top:'105%'},
        {anim:'_bdD', left:(20+Math.random()*60).toFixed(0)+'%', top:'-8%'}
      ];
      for (var bi = 0; bi < _bconfigs.length; bi++) {
        var bc = _bconfigs[bi];
        var bd = document.createElement('div');
        var bdur = (7 + Math.random() * 6).toFixed(1);
        var bdel = (Math.random() * 10).toFixed(1);
        var bsc  = (0.55 + Math.random() * 0.5).toFixed(2);
        bd.className = 'brd';
        bd.style.cssText = 'left:'+bc.left+';top:'+bc.top+';width:14px;height:6px;'
          +'transform:scale('+bsc+');'
          +'animation:'+bc.anim+' '+bdur+'s '+bdel+'s linear infinite;';
        birdWrap.appendChild(bd);
      }
      var wrap = document.createElement('div');
      wrap.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden;';
      document.documentElement.appendChild(wrap);
      var _drops = [], _lvl = -1;
      var _counts = [0, 18, 40, 160];
      function _setRain(lv) {
        if (lv === _lvl) return;
        _lvl = lv;
        var n = _counts[lv] || 0;
        while (_drops.length > n) wrap.removeChild(_drops.pop());
        while (_drops.length < n) {
          var d = document.createElement('div');
          var dur = (0.55 + Math.random() * 0.7).toFixed(2);
          var del = (Math.random() * parseFloat(dur)).toFixed(2);
          var h   = (10 + Math.random() * 12).toFixed(0);
          var op  = (0.28 + Math.random() * 0.35).toFixed(2);
          d.style.cssText = 'position:absolute;width:1px;height:'+h+'px;'
            +'background:rgba(180,210,255,'+op+');'
            +'left:'+(Math.random()*105-2).toFixed(1)+'%;top:0;'
            +'will-change:transform;'
            +'animation:_rf '+dur+'s '+del+'s linear infinite;';
          wrap.appendChild(d); _drops.push(d);
        }
      }
      _setRain(window._rainLevel);
      setInterval(function(){ _setRain(window._rainLevel||0); }, 600);
    })();
    // Polling: aplica noite assim que _nightRT estiver pronto (sem depender de timeout fixo)
    (function _waitNight() {
      if (!window._nightRT) { setTimeout(_waitNight, 400); return; }
      if (window._forceNight) window._nightRT.setAlpha(0.52);
      else updateDayNight();
    })();
  </script>
