<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
	<meta charset="UTF-8">
  <title>Reverie</title>
  <!-- Latest compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
	<!-- Optional theme -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">
  <style>
    /* Esconder tudo exceto o mapa */
    body > div > div:not(#game-container),
    body > div > br,
    body > div > h3,
    .row:not(#game-container .row),
    hr, .media, h2, h3, p,
    [style*="margin-top:10em"] { display: none !important; }

    /* Tela cheia */
    html, body { margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%; }
    body > div { margin:0 !important; padding:0 !important; }
    #game-container {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      text-align:center; background:#000;
    }
    #game-container canvas {
      position:absolute;
      top:50%; left:50%;
      transform-origin:center center;
      image-rendering:pixelated;
    }
  </style>
</head>

<body class="top-navigation" style="background-color: black">
  {% block content %}
	{% endblock content %}

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>

	{% block js_content %}
	{% endblock js_content %}

  <script>
    function fitCanvas() {
      var c = document.querySelector('#game-container canvas');
      if (!c) { setTimeout(fitCanvas, 300); return; }
      var sx = window.innerWidth  / c.offsetWidth;
      var sy = window.innerHeight / c.offsetHeight;
      var s  = Math.max(sx, sy);
      c.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
    }
    window.addEventListener('resize', fitCanvas);
    setTimeout(fitCanvas, 500);
    setTimeout(fitCanvas, 1500);
    setTimeout(fitCanvas, 3000);
  </script>
</body>
</html>
