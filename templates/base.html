<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
	<meta charset="UTF-8">
  <title>Reverie</title>
  <!-- Latest compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
	<!-- Optional theme -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">
  <style>
    /* Esconder tudo exceto o mapa */
    body > div > div:not(#game-container),
    body > div > br,
    body > div > h3,
    .row:not(#game-container .row),
    hr, .media, h2, h3, p,
    [style*="margin-top:10em"] { display: none !important; }

    /* Tela cheia */
    html, body { margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%; }
    body > div { margin:0 !important; padding:0 !important; }
    #game-container {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      text-align:center; background:#000;
    }
    #game-container canvas {
      position:absolute;
      top:50%; left:50%;
      transform-origin:center center;
      image-rendering:pixelated;
    }
    #day-night-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:999;
      transition: background-color 60s linear;
    }
  </style>
</head>

<body class="top-navigation" style="background-color: black">
  <div id="day-night-overlay"></div>
  {% block content %}
	{% endblock content %}

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>

	{% block js_content %}
	{% endblock js_content %}

  <script>
    var _s = 0, _sMin = 1;
    var _ox = 0, _oy = 0;
    var _CW = 4480, _CH = 3200;

    function _apply() {
      var c = document.querySelector('#game-container canvas');
      if (!c) return;
      var maxX = Math.max(0, (_CW * _s - window.innerWidth)  / 2);
      var maxY = Math.max(0, (_CH * _s - window.innerHeight) / 2);
      _ox = Math.max(-maxX, Math.min(maxX, _ox));
      _oy = Math.max(-maxY, Math.min(maxY, _oy));
      c.style.transform = 'translate(calc(-50% + ' + _ox + 'px), calc(-50% + ' + _oy + 'px)) scale(' + _s + ')';
    }

    function fitCanvas() {
      var c = document.querySelector('#game-container canvas');
      if (!c) { setTimeout(fitCanvas, 300); return; }
      _sMin = Math.max(window.innerWidth / c.offsetWidth, window.innerHeight / c.offsetHeight);
      if (_s < _sMin) _s = _sMin;
      _apply();
    }

    // Touch: 1 dedo = pan, 2 dedos = zoom
    var _pt = {}, _pd = null;
    document.addEventListener('touchstart', function(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        _pt[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(_pt);
      if (ids.length === 2)
        _pd = Math.hypot(_pt[ids[0]].x - _pt[ids[1]].x, _pt[ids[0]].y - _pt[ids[1]].y);
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
      var prev = {};
      for (var k in _pt) prev[k] = { x: _pt[k].x, y: _pt[k].y };
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (_pt[t.identifier]) _pt[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      var ids = Object.keys(_pt);
      if (ids.length >= 2) {
        var d = Math.hypot(_pt[ids[0]].x - _pt[ids[1]].x, _pt[ids[0]].y - _pt[ids[1]].y);
        if (_pd) _s = Math.max(_sMin, Math.min(_sMin * 5, _s * d / _pd));
        _pd = d;
      } else if (ids.length === 1) {
        var id = ids[0];
        _ox += _pt[id].x - prev[id].x;
        _oy += _pt[id].y - prev[id].y;
      }
      _apply();
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      for (var i = 0; i < e.changedTouches.length; i++)
        delete _pt[e.changedTouches[i].identifier];
      if (Object.keys(_pt).length < 2) _pd = null;
    }, { passive: false });

    window.addEventListener('resize', fitCanvas);
    setTimeout(fitCanvas, 500);
    setTimeout(fitCanvas, 1500);
    setTimeout(fitCanvas, 3000);

    // Ciclo dia/noite baseado no relógio local
    function updateDayNight() {
      var h = new Date().getHours() + new Date().getMinutes() / 60;
      var color, alpha;
      if      (h >= 6  && h < 8)  { color='255,140,50';  alpha=(8-h)/2*0.15; }   // amanhecer
      else if (h >= 8  && h < 17) { color='0,0,0';       alpha=0; }               // dia
      else if (h >= 17 && h < 19) { color='255,100,30';  alpha=(h-17)/2*0.15; }   // pôr do sol
      else if (h >= 19 && h < 21) { color='80,0,120';    alpha=0.08+(h-19)/2*0.1;}// crepúsculo
      else                        { color='0,10,60';     alpha=0.25; }             // noite
      document.getElementById('day-night-overlay').style.backgroundColor =
        'rgba(' + color + ',' + alpha + ')';
    }
    updateDayNight();
    setInterval(updateDayNight, 60000);
  </script>
</body>
</html>
