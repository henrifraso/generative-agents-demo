<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
	<meta charset="UTF-8">
  <title>Reverie</title>
  <!-- Latest compiled and minified CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
	<!-- Optional theme -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap-theme.min.css" integrity="sha384-6pzBo3FDv/PJ8r2KRkGHifhEocL+1X2rVCTTkUfGk7/0pbek5mMa1upzvWbrUbOZ" crossorigin="anonymous">
  <style>
    /* Esconder tudo exceto o mapa */
    body > div > div:not(#game-container),
    body > div > br,
    body > div > h3,
    .row:not(#game-container .row),
    hr, .media, h2, h3, p,
    [style*="margin-top:10em"] { display: none !important; }

    /* Tela cheia */
    html, body { margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%; }
    body > div { margin:0 !important; padding:0 !important; }
    #game-container {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      text-align:center; background:#000;
    }
    #game-container canvas { image-rendering:pixelated; }
    #canvas-wrapper { position:absolute; transform-origin:0 0; }
  </style>
</head>

<body class="top-navigation" style="background-color: black">
  {% block content %}
	{% endblock content %}

	<!-- Latest compiled and minified JavaScript -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
	<script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>

	{% block js_content %}
	{% endblock js_content %}

  <script>
    var _baseScale = 1;
    var _zoom = 1;
    var _panX = 0;
    var _panY = 0;

    var _CW = 4480, _CH = 3200;

    function _applyTransform() {
      var w = document.getElementById('canvas-wrapper');
      if (!w) return;
      var total = _baseScale * _zoom;
      var dw = _CW * total, dh = _CH * total;
      var maxX = Math.max(0, (dw - window.innerWidth)  / 2);
      var maxY = Math.max(0, (dh - window.innerHeight) / 2);
      _panX = Math.max(-maxX, Math.min(maxX, _panX));
      _panY = Math.max(-maxY, Math.min(maxY, _panY));
      w.style.left      = ((window.innerWidth  - dw) / 2 + _panX) + 'px';
      w.style.top       = ((window.innerHeight - dh) / 2 + _panY) + 'px';
      w.style.transform = 'scale(' + total + ')';
    }

    function fitCanvas() {
      var c = document.querySelector('#game-container canvas');
      if (!c) { setTimeout(fitCanvas, 200); return; }
      // Envolver canvas em wrapper se ainda não feito
      if (!document.getElementById('canvas-wrapper')) {
        var w = document.createElement('div');
        w.id = 'canvas-wrapper';
        c.parentNode.insertBefore(w, c);
        w.appendChild(c);
        c.style.position = 'absolute';
        c.style.left = '0';
        c.style.top = '0';
      }
      _baseScale = Math.max(window.innerWidth / _CW, window.innerHeight / _CH);
      _applyTransform();
    }

    window.mapZoom  = function(dz) { _zoom = Math.max(1, Math.min(5, _zoom + dz)); _applyTransform(); };
    window.mapPan   = function(dx, dy) { _panX += dx; _panY += dy; _applyTransform(); };
    window.mapZoomTo = function(z)  { _zoom = Math.max(1, Math.min(5, z)); _applyTransform(); };

    window.addEventListener('resize', fitCanvas);
    setTimeout(fitCanvas, 200);
    setTimeout(fitCanvas, 800);
    setTimeout(fitCanvas, 2000);
  </script>
</body>
</html>
